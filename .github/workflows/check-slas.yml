name: SLA breach check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call check-slas endpoint
        run: |
          curl -sf -X POST "${{ vars.APP_URL }}/api/cron/check-slas" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
